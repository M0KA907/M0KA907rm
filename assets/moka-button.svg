<svg xmlns="http://www.w3.org/2000/svg" width="780" height="170" viewBox="0 0 780 170" role="img" aria-labelledby="title desc">
  <title id="title">M0KA907 neon portfolio button</title>
  <desc id="desc">A minimal neon sign reading M0KA907, used as a link to the portfolio.</desc>
  <defs>
    <filter id="pinkGlow" x="-40%" y="-80%" width="180%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="a"/>
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feGaussianBlur stdDeviation="16" result="c"/>
      <feMerge>
        <feMergeNode in="c"/>
        <feMergeNode in="b"/>
        <feMergeNode in="a"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.08"/></feComponentTransfer>
      <feBlend mode="screen" in2="SourceGraphic"/>
    </filter>
    <style>
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,Liberation Mono,monospace}
      .name{font-size:74px;font-weight:900;letter-spacing:9px}
      .small{font-size:13px;letter-spacing:4px}
    </style>
  </defs>

  <rect width="780" height="170" rx="16" fill="#050507"/>
  <rect x="16" y="16" width="748" height="138" rx="10" fill="none" stroke="#f5f5f5" stroke-width="3" opacity="0.9"/>
  <rect x="25" y="25" width="730" height="120" rx="6" fill="none" stroke="#ff2a9d" stroke-width="2" opacity="0.8" filter="url(#pinkGlow)"/>
  <path d="M44 44l-24-24M736 44l24-24M44 126l-24 24M736 126l24 24" stroke="#f5f5f5" stroke-width="4" opacity="0.75"/>

  <text class="mono small" x="54" y="52" fill="#f5f5f5" opacity="0.82">PORTFOLIO</text>
  <text class="mono name" x="54" y="116" fill="#ffffff" stroke="#ff2a9d" stroke-width="1.1" filter="url(#pinkGlow)">M0KA907</text>
  <text class="mono small" x="557" y="135" fill="#9ffcff" filter="url(#pinkGlow)">CLICK</text>

  <rect width="780" height="170" filter="url(#paper)" opacity="0.36"/>
</svg>
