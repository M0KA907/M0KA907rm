<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" role="img" aria-labelledby="title desc">
  <title id="title">M0KA907 monochrome banner</title>
  <desc id="desc">Minimal black and white crust punk profile banner.</desc>
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.025"/></feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <style>
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,Liberation Mono,monospace}
      .big{font-size:94px;font-weight:900;letter-spacing:7px}
      .small{font-size:18px;letter-spacing:2px}
    </style>
  </defs>
  <rect width="1200" height="220" fill="#fff"/>
  <rect x="24" y="22" width="1152" height="176" fill="none" stroke="#000" stroke-width="5"/>
  <path d="M24 68H1176M24 154H1176" stroke="#000" stroke-width="3"/>
  <text class="mono small" x="54" y="50" fill="#000">M0KA907 / README.md</text>
  <text class="mono big" x="54" y="135" fill="#000">M0KA907</text>
  <text class="mono small" x="58" y="181" fill="#000">linux / static web / mods / repair</text>

  <g transform="translate(878 46)">
