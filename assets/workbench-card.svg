<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" role="img" aria-labelledby="title desc">
  <title id="title">M0KA907 minimal workbench card</title>
  <desc id="desc">A black and white terminal-style skill board.</desc>
  <defs>
    <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#000" opacity="0.14"/>
    </pattern>
    <style>
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,Liberation Mono,monospace}
      .h{font-size:22px;font-weight:900;letter-spacing:2px}
      .b{font-size:16px;letter-spacing:1px}
      .s{font-size:13px;letter-spacing:1.2px}
    </style>
  </defs>
  <rect width="1200" height="220" fill="#fff" stroke="#000" stroke-width="4"/>
  <rect x="12" y="12" width="1176" height="196" fill="url(#dots)"/>
  <path d="M12 58H1188M302 58V208M596 58V208M890 58V208" stroke="#000" stroke-width="3"/>
  <text class="mono h" fill="#000" x="34" y="38">WORKBENCH</text>
  <text class="mono s" fill="#000" x="194" y="37">small systems, plain files, fast rollback</text>

  <g transform="translate(34 92)">
    <text class="mono h" fill="#000" x="0" y="0">LINUX</text>
    <text class="mono b" fill="#000" x="0" y="34">Arch, i3, shell</text>
    <text class="mono s" fill="#000" x="0" y="66">desktop repair, packages</text>
  </g>
  <g transform="translate(330 92)">
    <text class="mono h" fill="#000" x="0" y="0">WEB</text>
    <text class="mono b" fill="#000" x="0" y="34">static pages</text>
    <text class="mono s" fill="#000" x="0" y="66">fallbacks, mobile cleanup</text>
  </g>
  <g transform="translate(624 92)">
    <text class="mono h" fill="#000" x="0" y="0">MODS</text>
    <text class="mono b" fill="#000" x="0" y="34">games, devices</text>
    <text class="mono s" fill="#000" x="0" y="66">configs, repair paths</text>
  </g>
  <g transform="translate(918 92)">
    <text class="mono h" fill="#000" x="0" y="0">DOCS</text>
    <text class="mono b" fill="#000" x="0" y="34">usage, tests</text>
    <text class="mono s" fill="#000" x="0" y="66">write the rollback</text>
  </g>
</svg>
