<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="34" viewBox="0 0 1200 34" role="img" aria-labelledby="title desc">
  <title id="title">Monochrome divider</title>
  <desc id="desc">A black and white rough horizontal divider.</desc>
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.92" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.07"/></feComponentTransfer>
      <feBlend in2="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
  <rect width="1200" height="34" fill="#fff" opacity="0"/>
  <path d="M30 17H1170" stroke="#000" stroke-width="4" stroke-dasharray="36 9 6 9"/>
  <path d="M30 10H1170M30 24H1170" stroke="#000" stroke-width="1.2" opacity="0.3"/>
  <rect width="1200" height="34" filter="url(#noise)" opacity="0.85"/>
</svg>
